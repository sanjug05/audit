<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR Connect | Greeting Studio v2</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
  --P: #0B3D2E; --PD: #082d22; --G: #b88a2d; --GL: #d4a843;
  --cream: #fdfbf6; --dark-bg: #0a1628; --tx: #1a1a1a; --txm: #5a6070;
  --app-bg: #051a14; --r: 10px; --ease: cubic-bezier(.4,0,.2,1);
  --shadow: 0 25px 60px -10px rgba(0,0,0,.5);
}
.th-blue  { --P:#1a237e; --PD:#0d1757; --G:#e5a530; --GL:#ffc107; --app-bg:#08102e; --dark-bg:#050e22; }
.th-plum  { --P:#4a0072; --PD:#38005a; --G:#ce93d8; --GL:#f48fb1; --app-bg:#1a0030; --dark-bg:#0d0018; }

*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Montserrat',sans-serif;background:var(--app-bg);color:#fff;min-height:100vh;overflow-x:hidden;}

.shell{display:grid;grid-template-columns:370px 1fr;min-height:100vh;}

/* ── SIDEBAR ── */
.sidebar{
  background:var(--P);padding:24px 22px;
  border-right:1px solid rgba(184,138,45,.18);
  display:flex;flex-direction:column;gap:14px;
  position:sticky;top:0;height:100vh;overflow-y:auto;
  scrollbar-width:thin;scrollbar-color:rgba(184,138,45,.25) transparent;
}
.sidebar::-webkit-scrollbar{width:3px;}
.sidebar::-webkit-scrollbar-thumb{background:rgba(184,138,45,.3);border-radius:2px;}

.brand{text-align:center;}
.brand img{max-width:130px;height:auto;margin:0 auto 8px;display:block;}
.brand-name{font-family:'Playfair Display',serif;font-size:20px;color:var(--G);letter-spacing:2px;text-transform:uppercase;}
.brand-sub{font-size:9px;text-transform:uppercase;letter-spacing:3px;opacity:.55;margin-top:3px;}
.logo-hint{font-size:9px;color:rgba(184,138,45,.45);text-transform:uppercase;letter-spacing:1px;cursor:pointer;margin-top:4px;display:inline-block;}
.logo-hint:hover{color:var(--G);}

/* theme picker */
.theme-row{display:flex;gap:8px;justify-content:center;}
.tdot{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:.2s;}
.tdot:hover,.tdot.on{border-color:#fff;}
.tdot.t0{background:linear-gradient(135deg,#0B3D2E,#b88a2d);}
.tdot.t1{background:linear-gradient(135deg,#1a237e,#e5a530);}
.tdot.t2{background:linear-gradient(135deg,#4a0072,#ce93d8);}

.fgrp{display:flex;flex-direction:column;gap:5px;}
label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--GL);}
.ic{
  background:rgba(255,255,255,.06);border:1px solid rgba(184,138,45,.28);
  padding:9px 13px;border-radius:8px;color:#fff;font-family:inherit;
  outline:none;transition:.25s;font-size:13px;width:100%;
}
.ic:focus{border-color:var(--G);background:rgba(255,255,255,.1);}
textarea.ic{resize:none;}
select.ic optgroup{color:var(--G);background:var(--PD);font-style:normal;font-weight:700;}
select.ic option{background:var(--PD);color:#fff;}
.ctr{font-size:10px;color:rgba(255,255,255,.3);text-align:right;margin-top:-3px;}

/* name row */
.nrow{display:flex;gap:6px;align-items:center;}
.nrow .ic{flex:1;}
.ibtn{
  width:34px;height:34px;border-radius:8px;
  border:1px solid rgba(184,138,45,.35);background:rgba(255,255,255,.05);
  color:var(--G);cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;transition:.2s;
}
.ibtn:hover{background:rgba(184,138,45,.2);}
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px;}
.chip{
  background:rgba(255,255,255,.06);border:1px solid rgba(184,138,45,.22);
  padding:3px 10px;border-radius:20px;font-size:11px;cursor:pointer;
  transition:.2s;display:flex;align-items:center;gap:5px;
}
.chip:hover{background:rgba(184,138,45,.2);border-color:var(--G);}
.chip-x{opacity:.35;font-size:9px;}
.chip-x:hover{opacity:1;color:#e74c3c;}

/* buttons */
.bstack{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.bfull{grid-column:1/-1;}
.btn{
  padding:10px 12px;border-radius:8px;border:none;cursor:pointer;
  font-weight:700;text-transform:uppercase;letter-spacing:1px;font-size:11px;
  transition:.25s var(--ease);display:flex;align-items:center;justify-content:center;gap:7px;
}
.btn-p{background:var(--G);color:var(--PD);}
.btn-p:hover:not(:disabled){background:var(--GL);transform:translateY(-1px);}
.btn-s{background:transparent;border:1px solid rgba(184,138,45,.45);color:var(--G);}
.btn-s:hover:not(:disabled){background:rgba(184,138,45,.15);}
.btn-wa{background:#25D366;color:#fff;}
.btn-wa:hover:not(:disabled){background:#1eba58;}
.btn:disabled{opacity:.3;pointer-events:none;}

.divider{height:1px;background:rgba(255,255,255,.08);margin:2px 0;}

/* history */
.sec-hd{display:flex;justify-content:space-between;align-items:center;cursor:pointer;}
.sec-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--GL);}
.hlist{display:none;flex-direction:column;gap:5px;margin-top:8px;}
.hlist.open{display:flex;}
.hi{
  background:rgba(255,255,255,.03);padding:7px 10px;border-radius:6px;
  font-size:11px;cursor:pointer;transition:.2s;border:1px solid transparent;
}
.hi:hover{background:rgba(255,255,255,.08);border-color:rgba(184,138,45,.28);}
.hn{font-weight:600;color:var(--G);font-size:12px;}
.ht{opacity:.45;font-size:10px;}

/* ── MAIN ── */
.main{
  padding:50px 40px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:radial-gradient(circle at 50% 35%,rgba(11,61,46,.35) 0%,var(--app-bg) 65%);
  min-height:100vh;
}
#stage{width:100%;display:flex;align-items:center;justify-content:center;}

/* ── CARD ── */
#card{
  width:min(720px,100%);height:500px;
  background:var(--cream);display:flex;flex-direction:row;
  border-radius:6px;overflow:hidden;
  box-shadow:var(--shadow);position:relative;
  color:var(--tx);border:2.5px solid var(--G);
  outline:2px solid rgba(184,138,45,.18);outline-offset:4px;
}
.cv{width:42%;position:relative;overflow:hidden;background:var(--PD);flex-shrink:0;}
.cv svg{width:100%;height:100%;display:block;position:absolute;top:0;left:0;}
.cv-ov{position:absolute;inset:0;background:linear-gradient(to right,rgba(0,0,0,.08),transparent);pointer-events:none;z-index:1;}

.cc{
  flex:1;padding:28px 38px 52px;
  display:flex;flex-direction:column;justify-content:space-between;
  position:relative;background:var(--cream);overflow:hidden;
}
.cc::before{
  content:'';position:absolute;top:14px;bottom:14px;left:14px;right:14px;
  border:1px solid rgba(11,61,46,.05);pointer-events:none;
}
.chr{display:flex;justify-content:space-between;align-items:flex-start;position:relative;z-index:1;}
.clogo{height:100px;width:auto;max-width:150px;object-fit:contain;}
.chm{text-align:right;}
.csub{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--txm);}
.cline{height:2px;width:48px;background:var(--G);margin-left:auto;margin-top:4px;}
.ctag{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:4px;color:var(--G);position:relative;z-index:1;}
.crcp{font-family:'Cormorant Garamond',serif;font-size:15px;font-style:italic;color:var(--txm);margin-bottom:2px;position:relative;z-index:1;}
.ctitle{font-family:'Playfair Display',serif;font-size:25px;line-height:1.2;color:#0B3D2E;position:relative;z-index:1;margin-bottom:9px;}
.cmsg{font-family:'Cormorant Garamond',serif;font-size:13.5px;line-height:1.58;color:var(--txm);font-style:italic;position:relative;z-index:1;}
.csig{border-top:1.5px solid rgba(184,138,45,.28);padding-top:9px;position:relative;z-index:1;}
.csig-n{font-weight:700;font-size:11px;color:#0B3D2E;text-transform:uppercase;}
.csig-d{font-size:8px;letter-spacing:1px;color:var(--G);font-weight:600;margin-top:2px;}

/* stamp */
.stamp{
  position:absolute;bottom:38px;right:18px;
  width:62px;height:62px;border:2.5px solid var(--G);
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  text-align:center;font-size:7px;font-weight:700;text-transform:uppercase;
  letter-spacing:.8px;color:var(--G);transform:rotate(-12deg);
  z-index:3;background:rgba(253,251,246,.88);
}
.stamp::before{content:'';position:absolute;inset:4px;border:1px solid rgba(184,138,45,.3);border-radius:50%;}
.stamp-inner{line-height:1.25;text-align:center;font-size:6.5px;}

/* footer */
.cfoot{
  position:absolute;bottom:0;left:0;width:100%;
  background:#0a1628;color:var(--G);
  padding:7px 20px;text-align:center;
  font-size:9px;letter-spacing:2px;font-weight:500;
  border-top:1.5px solid var(--G);z-index:5;
  display:flex;align-items:center;justify-content:center;gap:0;
}

.empty{text-align:center;opacity:.35;font-size:14px;letter-spacing:1px;}

/* loader */
.loader{
  position:fixed;inset:0;background:rgba(11,61,46,.93);
  display:none;align-items:center;justify-content:center;
  z-index:1000;flex-direction:column;gap:14px;
}
.loader.on{display:flex;}
.loader p{font-size:10px;letter-spacing:3px;opacity:.65;}

/* toast */
.toast{
  position:fixed;bottom:24px;right:24px;background:var(--PD);color:#fff;
  padding:11px 18px;border-radius:8px;border:1px solid var(--G);
  z-index:2000;transform:translateY(90px);opacity:0;
  transition:all .3s ease;font-size:12px;letter-spacing:.4px;max-width:270px;
}
.toast.on{transform:translateY(0);opacity:1;}
.toast.err{border-color:#e74c3c;background:#2c0808;}

/* progress */
.prog-wrap{width:200px;height:3px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden;}
.prog-bar{height:100%;width:0%;background:var(--G);transition:width .3s;}

@media(max-width:900px){
  .shell{grid-template-columns:1fr;}
  .sidebar{height:auto;position:static;overflow-y:visible;}
  .main{padding:30px 20px;min-height:auto;}
}
@media(max-width:600px){
  #card{flex-direction:column;height:auto;}
  .cv{width:100%;height:180px;}
  .cc{padding:20px 20px 52px;}
  .ctitle{font-size:20px;}
}
@media print{
  -webkit-print-color-adjust:exact;
  print-color-adjust:exact;
  .sidebar,.loader,.toast,#btnBar,header,.toolbar{display:none!important;}
  body{background:#fff!important;margin:0;padding:0;}
  .shell,.main{display:block!important;padding:0!important;margin:0!important;background:transparent!important;}
  #stage{padding:0!important;margin:0!important;display:flex;justify-content:center;align-items:flex-start;}
  #card{
    width:720px!important;max-width:100%!important;height:500px!important;
    box-shadow:none!important;outline:none!important;margin:0 auto!important;
    page-break-inside:avoid;
  }
  #card[data-multi-bday="true"]{
    flex-direction:column!important;
    background:#0a1628!important;
  }
}

/* ── Birthday Multiple – sidebar person blocks ── */
#grpBdayPersons{display:flex;flex-direction:column;gap:10px;}
.bp-block{background:rgba(255,255,255,.04);border:1px solid rgba(184,138,45,.22);border-radius:8px;padding:10px 12px;display:flex;flex-direction:column;gap:6px;}
.bp-hd{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--GL);}
.bp-photo-wrap{position:relative;width:100%;height:70px;background:rgba(255,255,255,.04);border:1.5px dashed rgba(184,138,45,.3);border-radius:8px;overflow:hidden;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;color:rgba(255,255,255,.3);transition:.2s;}
.bp-photo-wrap:hover{border-color:var(--G);color:var(--G);}
.bp-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:none;}
.bp-photo-wrap.has-img .bp-img{display:block;}
.bp-photo-wrap.has-img .bp-placeholder{display:none;}
.bp-upload-input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;z-index:2;}
.bp-clear{position:absolute;top:4px;right:4px;background:rgba(231,76,60,.88);color:#fff;border:none;border-radius:4px;width:20px;height:20px;cursor:pointer;font-size:10px;display:none;align-items:center;justify-content:center;z-index:3;line-height:1;padding:0;}
.bp-photo-wrap.has-img .bp-clear{display:flex;}
</style>
</head>
<body>

<div class="shell" id="shell">
  <aside class="sidebar">

    <!-- Brand -->
    <div class="brand">
      <img id="blogo" src="" alt="Logo" onerror="this.style.display='none'" style="display:none">
      <div class="brand-name">HR Connect</div>
      <div class="brand-sub">People & Culture Studio</div>
      <label for="logoFile" class="logo-hint"><i class="fas fa-upload" style="font-size:8px"></i> Upload Logo</label>
      <input type="file" id="logoFile" accept="image/*" style="display:none">
    </div>

    <!-- Theme -->
    <div class="fgrp">
      <label>Theme</label>
      <div class="theme-row">
        <div class="tdot t0 on" data-th="" title="Classic Green"></div>
        <div class="tdot t1" data-th="th-blue" title="Royal Blue"></div>
        <div class="tdot t2" data-th="th-plum" title="Deep Plum"></div>
      </div>
    </div>

    <!-- Occasion -->
    <div class="fgrp">
      <label for="fOcc">Occasion</label>
      <select class="ic" id="fOcc">
        <optgroup label="Employee Personal">
          <option value="birthday" selected>Birthday Wishes</option>
          <option value="workAnniversary">Work Anniversary</option>
          <option value="weddingAnniversary">Wedding Anniversary</option>
          <option value="marriage">Marriage Congratulations</option>
          <option value="newBaby">New Baby / Parenthood</option>
          <option value="housewarming">Housewarming</option>
          <option value="promotion">Promotion Congratulations</option>
          <option value="certification">Certification / Achievement</option>
          <option value="retirement">Retirement Wishes</option>
          <option value="farewell">Farewell Message</option>
          <option value="welcome">Joining Day / Welcome</option>
        </optgroup>
        <optgroup label="Festivals & Cultural">
          <option value="newYear">New Year</option>
          <option value="diwali">Diwali</option>
          <option value="holi">Holi</option>
          <option value="eid">Eid-ul-Fitr</option>
          <option value="christmas">Christmas</option>
          <option value="gurpurab">Gurpurab</option>
          <option value="navratri">Navratri / Dussehra</option>
          <option value="ganeshChaturthi">Ganesh Chaturthi</option>
          <option value="rakshaBandhan">Raksha Bandhan</option>
          <option value="independenceDay">Independence Day</option>
          <option value="republicDay">Republic Day</option>
          <option value="harvestFestival">Lohri / Pongal / Sankranti</option>
          <option value="onam">Onam</option>
          <option value="baisakhi">Baisakhi</option>
          <option value="janmashtami">Janmashtami</option>
          <option value="buddhaPurnima">Buddha Purnima</option>
          <option value="easter">Good Friday / Easter</option>
          <option value="yogaDay">International Yoga Day</option>
        </optgroup>
        <optgroup label="Appreciation & Awards">
          <option value="employeeMonth">Employee of the Month</option>
          <option value="starPerformer">Star Performer</option>
          <option value="teamAchievement">Team Achievement</option>
          <option value="salesMilestone">Sales Milestone</option>
          <option value="targetAchieved">Target Achievement</option>
          <option value="leadership">Leadership Appreciation</option>
          <option value="thankYou">Thank You Message</option>
          <option value="quarterlyAward">Quarterly Performance Award</option>
          <option value="annualAward">Annual Awards</option>
        </optgroup>
        <optgroup label="Health & Wellbeing">
          <option value="getWell">Get Well Soon</option>
          <option value="mentalHealth">Mental Health Awareness</option>
          <option value="worldHealth">World Health Day</option>
          <option value="fitnessChallenge">Fitness Challenge Launch</option>
          <option value="bloodDonation">Blood Donation Camp</option>
          <option value="wellnessReminder">Wellness Reminder</option>
        </optgroup>
        <optgroup label="Corporate & Engagement">
          <option value="mondayMotivation">Monday Motivation</option>
          <option value="fridaySignoff">Friday Sign-off</option>
          <option value="fyClosing">Financial Year Closing</option>
          <option value="foundationDay">Company Foundation Day</option>
          <option value="townhall">Townhall Invitation</option>
          <option value="training">Training Announcement</option>
          <option value="policyUpdate">Policy Communication</option>
          <option value="safety">Safety Awareness</option>
          <option value="teamOuting">Team Outing / Annual Party</option>
          <option value="funFriday">Fun Friday Activities</option>
          <option value="contest">Quiz / Contest Launch</option>
        </optgroup>
        <optgroup label="Diversity & Inclusion">
          <option value="womensDay">International Women's Day</option>
          <option value="mensDay">Men's Day</option>
          <option value="pride">Pride Month</option>
          <option value="mothersDay">Mother's Day</option>
          <option value="fathersDay">Father's Day</option>
        </optgroup>
        <optgroup label="Sensitive Situations">
          <option value="condolence">Condolence Message</option>
          <option value="bereavement">Bereavement Support</option>
          <option value="crisis">Crisis / Disaster Support</option>
        </optgroup>
      </select>
    </div>

    <!-- Years (work anniversary only) -->
    <div class="fgrp" id="grpYrs" style="display:none">
      <label for="fYrs">Years Completed</label>
      <input type="number" id="fYrs" class="ic" min="1" max="50" value="1">
    </div>

    <!-- Birthday Multiple (birthday occasion only) -->
    <div class="fgrp" id="grpBdayMult" style="display:none">
      <label for="fBdayMult"><i class="fas fa-users" style="font-size:9px;margin-right:4px"></i>Birthday Multiple</label>
      <select class="ic" id="fBdayMult">
        <option value="1">Single Birthday</option>
        <option value="2">2 Birthdays</option>
        <option value="3">3 Birthdays</option>
        <option value="4">4 Birthdays</option>
        <option value="5">5 Birthdays</option>
      </select>
    </div>
    <div id="grpBdayPersons"></div>

    <!-- Recipient -->
    <div class="fgrp">
      <label>Recipient Name</label>
      <div class="nrow">
        <input type="text" class="ic" id="fName" placeholder="Enter name…" value="Team Member" maxlength="40" autocomplete="off">
        <button class="ibtn" id="btnSave" title="Save name to quick list"><i class="fas fa-bookmark" style="font-size:11px"></i></button>
      </div>
      <div id="ctr" class="ctr">11 / 40</div>
      <div class="chips" id="chips"></div>
    </div>

    <!-- From -->
    <div class="fgrp">
      <label for="fFrom">From / Sender</label>
      <input type="text" class="ic" id="fFrom" value="People & Culture Team" autocomplete="off">
    </div>

    <!-- Tone -->
    <div class="fgrp">
      <label for="fTone">Message Tone</label>
      <select class="ic" id="fTone">
        <option value="Formal">Formal & Professional</option>
        <option value="Warm">Warm & Personal</option>
        <option value="Celebratory">Celebratory & Energetic</option>
      </select>
    </div>

    <!-- Custom Message -->
    <div class="fgrp">
      <label for="fMsg">Custom Message <span style="opacity:.5;font-size:9px">(optional)</span></label>
      <textarea class="ic" id="fMsg" rows="3" placeholder="Leave blank to use auto-generated message…"></textarea>
    </div>

    <!-- Buttons -->
    <div class="bstack">
      <button class="btn btn-p bfull" id="btnGen"><i class="fas fa-magic"></i> Generate Preview</button>
      <button class="btn btn-s" id="btnPNG" disabled><i class="fas fa-download"></i> Export PNG</button>
      <button class="btn btn-s" id="btnClip" disabled><i class="fas fa-copy"></i> Copy Image</button>
      <button class="btn btn-s" id="btnPrint" disabled><i class="fas fa-print"></i> Print / PDF</button>
      <button class="btn btn-wa bfull" id="btnWA"><i class="fab fa-whatsapp"></i> Share via WhatsApp</button>
    </div>

    <div class="divider"></div>

    <!-- History -->
    <div>
      <div class="sec-hd" id="togHist">
        <span class="sec-lbl"><i class="fas fa-history" style="margin-right:5px;font-size:9px"></i>Recent Cards</span>
        <i class="fas fa-chevron-down" id="histChev" style="font-size:9px;opacity:.5"></i>
      </div>
      <div class="hlist" id="hlist"></div>
      <button id="btnClrHist" class="btn btn-s bfull" style="display:none;margin-top:8px;font-size:10px;padding:6px">
        <i class="fas fa-trash" style="font-size:10px"></i> Clear History
      </button>
    </div>

    <div style="margin-top:auto;font-size:10px;opacity:.37;text-align:center;padding-top:14px;line-height:1.9">
      Transforming Experiences • Sanju G.<br>
      <span style="opacity:.6">HR Connect V5.0</span>
    </div>
  </aside>

  <main class="main">
    <div id="stage">
      <div class="empty">
        <i class="fas fa-gem" style="font-size:38px;opacity:.3;display:block;margin-bottom:14px"></i>
        Select an occasion and click <strong>Generate Preview</strong>
      </div>
    </div>
  </main>
</div>

<div class="loader" id="loader">
  <i class="fas fa-circle-notch fa-spin" style="font-size:28px;color:var(--G)"></i>
  <div class="prog-wrap"><div class="prog-bar" id="progBar"></div></div>
  <p id="loaderMsg">PREPARING DESIGN…</p>

/* ── helpers ── */
function san(s){ const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }

function toast_(msg, err=false){
  if(toastTmr) clearTimeout(toastTmr);
  toast.textContent = msg;
  toast.className = 'toast on' + (err?' err':'');
  toastTmr = setTimeout(()=>{ toast.className='toast'; }, 3800);
}

function setProgress(p, msg){
  progBar.style.width = p + '%';
  if(msg) loaderMsg.textContent = msg;
}

/* ── Logo ── */
// Try these filenames in order before falling back to uploaded logo
const LOGO_CANDIDATES = ['Logo05.png','Logo05.PNG','Logo05.JPG','logo05.png','Logo5.png','Logo5.PNG','logo.png','Logo.png'];
let logoAutoLoaded = false;

function applyLogo(){
  const src = logoB64 || logoDirectSrc;
  if(src){
    blogo.src = src;
    blogo.style.display = 'block';
  }
}

function tryAutoLoadLogo(idx){
  if(idx >= LOGO_CANDIDATES.length){
    // All candidates exhausted — fall back to localStorage upload
    applyLogo();
    return;
  }
  const img = new Image();
  img.onload = () => {
    // Found it — convert to base64 so it works in canvas export too
    const cvs = document.createElement('canvas');
    cvs.width = img.naturalWidth; cvs.height = img.naturalHeight;
    const ctx = cvs.getContext('2d');
    ctx.drawImage(img, 0, 0);
    try {
      logoB64 = cvs.toDataURL('image/png');
      localStorage.setItem('hrc_logo', logoB64);
      logoAutoLoaded = true;
      applyLogo();
    } catch(e){
      // canvas taint on file:// — store path directly; use it in card generation
      logoDirectSrc = LOGO_CANDIDATES[idx];
      blogo.src = LOGO_CANDIDATES[idx];
      blogo.style.display = 'block';
      logoAutoLoaded = true;
    }
  };
  img.onerror = () => tryAutoLoadLogo(idx + 1);
  img.src = LOGO_CANDIDATES[idx];
}

// Immediately set Logo05.PNG as the direct source so generateCard works right away
// tryAutoLoadLogo will upgrade to base64 if possible (needed for PNG export)
logoDirectSrc = 'Logo05.PNG';

// If no logo uploaded yet, try auto-detecting Logo05.PNG from same folder
if(!logoB64){
  tryAutoLoadLogo(0);
} else {
  applyLogo();
}

logoFile.onchange = e => {
  const f = e.target.files[0];
  if(!f) return;
  if(!f.type.startsWith('image/')){ toast_('Please select an image file.', true); return; }
  if(f.size > 2 * 1024 * 1024){ toast_('Logo file is too large (max 2 MB).', true); return; }
  const r = new FileReader();
  r.onload = ev => {
    logoB64 = ev.target.result;
    localStorage.setItem('hrc_logo', logoB64);
    applyLogo();
    toast_('Logo uploaded and saved!');
  };
  r.readAsDataURL(f);
};

/* ── Birthday Multiple – field builder ── */
fBdayMult.onchange = () => {
  const count = parseInt(fBdayMult.value) || 1;
  buildBdayPersonFields(count);
};

function buildBdayPersonFields(count) {
  const container = document.getElementById('grpBdayPersons');
  container.innerHTML = '';
  if (count === 0) { container.style.display = 'none'; return; }
  container.style.display = 'flex';
  // Clear photo data for slots beyond count
  for (let k in bdayPhotoData) { if (parseInt(k) >= count) delete bdayPhotoData[k]; }
  for (let i = 0; i < count; i++) {
    const hasImg = !!(bdayPhotoData[i] && bdayPhotoData[i].src);
    const block = document.createElement('div');
    block.className = 'bp-block';
    if (count === 1) {
      // Single birthday — dept + photo (name comes from Recipient Name field above)
      block.innerHTML = `
        <div class="bp-hd"><i class="fas fa-id-badge" style="font-size:8px;margin-right:5px"></i>Birthday Person Details <span style="font-weight:400;text-transform:none;letter-spacing:0;opacity:.45">(optional · personalises the card)</span></div>
        <input type="text" class="ic" id="bdayDept0" placeholder="Department  e.g. Finance, Operations…" maxlength="40" autocomplete="off" style="padding:7px 11px;font-size:12px" value="${(bdayPhotoData[0]&&bdayPhotoData[0].dept)||''}">
        <div class="bp-photo-wrap${hasImg?' has-img':''}" id="bdayWrap0">
          <span class="bp-placeholder" style="display:flex;align-items:center;gap:6px;font-size:11px;pointer-events:none"><i class="fas fa-user-circle" style="font-size:13px"></i>Upload photo to personalise card</span>
          <img class="bp-img" id="bdayImg0" src="${hasImg?bdayPhotoData[0].src:''}" alt="">
          <input type="file" class="bp-upload-input" accept="image/*" data-idx="0">
          <button type="button" class="bp-clear" data-idx="0" title="Remove photo">✕</button>
        </div>`;
    } else {
      // 2–5 birthdays — name + dept + photo per person
      block.innerHTML = `
        <div class="bp-hd"><i class="fas fa-user" style="font-size:8px;margin-right:5px"></i>Person ${i+1}</div>
        <input type="text" class="ic" id="bdayName${i}" placeholder="Name…" maxlength="30" autocomplete="off" style="padding:7px 11px;font-size:12px" value="${(bdayPhotoData[i]&&bdayPhotoData[i].name)||''}">
        <input type="text" class="ic" id="bdayDept${i}" placeholder="Department  e.g. Finance, Operations…" maxlength="40" autocomplete="off" style="padding:6px 11px;font-size:11px;color:rgba(255,255,255,.7)" value="${(bdayPhotoData[i]&&bdayPhotoData[i].dept)||''}">
        <div class="bp-photo-wrap${hasImg?' has-img':''}" id="bdayWrap${i}">
          <span class="bp-placeholder" style="display:flex;align-items:center;gap:5px;font-size:11px;pointer-events:none"><i class="fas fa-camera" style="font-size:9px"></i>Upload Photo</span>
          <img class="bp-img" id="bdayImg${i}" src="${hasImg?bdayPhotoData[i].src:''}" alt="">
          <input type="file" class="bp-upload-input" accept="image/*" data-idx="${i}">
          <button type="button" class="bp-clear" data-idx="${i}" title="Remove photo">✕</button>
        </div>`;
    }
    // File upload
    block.querySelector('.bp-upload-input').addEventListener('change', function(e) {
      const f = e.target.files[0];
      if (!f) return;
      if (!f.type.startsWith('image/')) { toast_('Please select an image file.', true); return; }
      if (f.size > 4 * 1024 * 1024) { toast_('Photo too large (max 4 MB).', true); return; }
      const idx = parseInt(this.dataset.idx);
      const reader = new FileReader();
      reader.onload = ev => {
        const src = ev.target.result;
        if (!bdayPhotoData[idx]) bdayPhotoData[idx] = {};
        bdayPhotoData[idx].src = src;
        const imgEl = document.getElementById('bdayImg' + idx);
        const wrapEl = document.getElementById('bdayWrap' + idx);
        if (imgEl) imgEl.src = src;
        if (wrapEl) wrapEl.classList.add('has-img');
      };
      reader.readAsDataURL(f);
    });
    // Persist name & dept on input so values survive count switches
    const nameInp = block.querySelector(`#bdayName${i}`);
    if (nameInp) nameInp.addEventListener('input', function() {
      if (!bdayPhotoData[i]) bdayPhotoData[i] = {};
      bdayPhotoData[i].name = this.value;
    });
    const deptInp = block.querySelector(`#bdayDept${i}`);
    if (deptInp) deptInp.addEventListener('input', function() {
      if (!bdayPhotoData[i]) bdayPhotoData[i] = {};
      bdayPhotoData[i].dept = this.value;
    });
    // Clear button
    block.querySelector('.bp-clear').addEventListener('click', function(e) {
      e.preventDefault(); e.stopPropagation();
      const idx = parseInt(this.dataset.idx);
      if (bdayPhotoData[idx]) delete bdayPhotoData[idx].src;
      const imgEl = document.getElementById('bdayImg' + idx);
      const wrapEl = document.getElementById('bdayWrap' + idx);
      const fi = wrapEl ? wrapEl.querySelector('.bp-upload-input') : null;
      if (imgEl) imgEl.src = '';
      if (wrapEl) wrapEl.classList.remove('has-img');
      if (fi) fi.value = '';
    });
    container.appendChild(block);
  }
}

function getBdayPersons(count) {
  const persons = [];
  for (let i = 0; i < count; i++) {
    const nameEl = document.getElementById('bdayName' + i);
    const deptEl = document.getElementById('bdayDept' + i);
    const name = nameEl ? (nameEl.value.trim() || ('Team Member ' + (i+1))) : ('Team Member ' + (i+1));
    const dept = deptEl ? deptEl.value.trim() : ((bdayPhotoData[i] && bdayPhotoData[i].dept) || '');
    const imgSrc = (bdayPhotoData[i] && bdayPhotoData[i].src) ? bdayPhotoData[i].src : '';
    persons.push({ name, dept, imgSrc });
  }
  return persons;
}

/* ── Saved names ── */
function renderChips(){
  chipsEl.innerHTML = '';
  savedNames.forEach((nm, i) => {
    const chip = document.createElement('div');
    chip.className = 'chip';
    chip.innerHTML = `<span>${san(nm)}</span><span class="chip-x" data-i="${i}" title="Remove">✕</span>`;
    chip.querySelector('span:first-child').onclick = () => { fName.value = nm; fName.oninput(); };
    chip.querySelector('.chip-x').onclick = e => {
      e.stopPropagation();
      savedNames.splice(i, 1);
      localStorage.setItem('hrc_names', JSON.stringify(savedNames));
      renderChips();
    };
    chipsEl.appendChild(chip);
  });
}
renderChips();

btnSave.onclick = () => {
  const nm = fName.value.trim();
  if(!nm){ toast_('Enter a name first.', true); return; }
  if(savedNames.includes(nm)){ toast_('Name already saved!'); return; }
  if(savedNames.length >= 12){ toast_('Max 12 saved names. Remove one first.', true); return; }
  savedNames.push(nm);
  localStorage.setItem('hrc_names', JSON.stringify(savedNames));
  renderChips();
  toast_('Name saved to quick list!');
};

/* ── History ── */
function saveHist(item){
  history_ = history_.filter(c => !(c.occ===item.occ && c.name===item.name));
  history_.unshift(item);
  if(history_.length > 10) history_.pop();
  localStorage.setItem('hrc_hist', JSON.stringify(history_));
  renderHist();
}

function renderHist(){
  if(!history_.length){
    hlist.innerHTML = '<div style="font-size:11px;opacity:.35;padding:8px 0">No recent cards</div>';
    btnClrH.style.display = 'none';
  } else {
    hlist.innerHTML = history_.map((item,i) =>
      `<div class="hi" onclick="window._loadHist(${i})">
        <div class="hn">${san(item.name)}</div>
        <div class="ht">${san(item.tag)}</div>
      </div>`
    ).join('');
    btnClrH.style.display = 'block';
  }
}
renderHist();

window._loadHist = i => {
  if(!confirm('Load this card? Unsaved changes will be replaced.')) return;
  const item = history_[i];
  fOcc.value = item.occ; fName.value = item.name; fFrom.value = item.from;
  fTone.value = item.tone; fMsg.value = item.customMsg || '';
  fYrs.value = item.years || 1;
  // Reset birthday multiple to single on history load
  if (fBdayMult) { fBdayMult.value = '1'; buildBdayPersonFields(0); }
  fOcc.onchange(); fName.oninput();
  generateCard(true);
};

togHist.onclick = () => {
  const open = hlist.classList.toggle('open');
  histChev.className = 'fas ' + (open ? 'fa-chevron-up' : 'fa-chevron-down');
};
btnClrH.onclick = () => {
  if(!confirm('Clear all card history?')) return;
  history_ = []; localStorage.removeItem('hrc_hist');
  renderHist(); toast_('History cleared.');
};

/* ── Generate Card ── */
function generateCard(isReload=false){
  const occ  = fOcc.value;
  const name = fName.value.trim() || 'Team Member';
  const from = fFrom.value.trim() || 'People & Culture Team';
  const tone = fTone.value;
  const cMsg = fMsg.value.trim();
  const yrs  = Math.min(50, Math.max(1, parseInt(fYrs.value)||1));
  const tmpl = T[occ] || T.birthday;

  /* ── Multi-birthday mode ── */
  if (occ === 'birthday' && fBdayMult && fBdayMult.value !== '1') {
    const count   = parseInt(fBdayMult.value) || 2;
    const persons = getBdayPersons(count);
    const logoSrc = logoB64 || logoDirectSrc;
    stage.innerHTML = renderMultiBdayCard(persons, from, cMsg, logoSrc, tone);
    btnPNG.disabled = false; btnClip.disabled = false; btnPrint.disabled = false;
    if (!isReload) {
      const nameTag = persons.map(p=>p.name).join(', ');
      saveHist({ occ, name: nameTag, from, tone, customMsg: cMsg, years: yrs, tag: 'Birthday Celebrations' });
    }
    return;
  }

  let title = tmpl.title.replace(/<span>/g,'<span style="color:#b88a2d">');
  if(occ === 'workAnniversary'){
    title = `Celebrating <span style="color:#b88a2d">${yrs} ${yrs===1?'Year':'Years'}</span> of Excellence`;
  }
  const msg = cMsg || tmpl['msg'+tone] || tmpl.msgFormal;
  const visual = getVisual(occ);

  // Single birthday: use uploaded photo as the left panel if available
  const singleBdayPhoto = (occ === 'birthday' && bdayPhotoData[0] && bdayPhotoData[0].src)
    ? bdayPhotoData[0].src : null;
  const visualContent = singleBdayPhoto
    ? `<img src="${singleBdayPhoto}" style="width:100%;height:100%;object-fit:cover;display:block;position:absolute;inset:0;">`
    : visual;

  // Single birthday dept label
  const singleBdayDept = occ === 'birthday'
    ? (() => { const el = document.getElementById('bdayDept0'); return el ? el.value.trim() : ''; })()
    : '';
  const deptBadge = singleBdayDept
    ? `<div style="display:inline-block;font-size:10px;font-weight:600;color:#6d9e6b;letter-spacing:.7px;font-style:italic;margin-top:-2px;margin-bottom:5px;">${san(singleBdayDept)}</div>`
    : '';

  const year = new Date().getFullYear();
  const logoSrc = logoB64 || logoDirectSrc;
  const logoHTML = logoSrc
    ? `<img src="${logoSrc}" alt="Company Logo" class="clogo" style="height:90px;width:auto;max-width:150px;object-fit:contain;">`
    : `<div style="font-family:'Playfair Display',serif;font-size:16px;color:#0B3D2E;letter-spacing:1px;padding-top:8px;">HR Connect</div>`;

  stage.innerHTML = `
  <div id="card">
    <div class="cv">${visualContent}<div class="cv-ov"></div></div>
    <div class="cc">
      <div class="chr">
        ${logoHTML}
        <div class="chm"><div class="csub">People & Culture</div><div class="cline"></div></div>
      </div>
      <div>
        <div class="ctag">${san(tmpl.tag)}</div>
        <div class="crcp">Dear ${san(name)},</div>
        ${deptBadge}
        <h1 class="ctitle">${title}</h1>
        <p class="cmsg">${san(msg)}</p>
      </div>
      <div class="csig">
        <div class="csig-n">${san(from)}</div>
        <div class="csig-d">AIS WINDOWS · ASAHI INDIA GLASS LTD.</div>
      </div>
    </div>
    <div class="stamp">
      <div class="stamp-inner">${year}<br>✦<br>HR<br>Connect</div>
    </div>
    <div class="cfoot">
      <span>Excellence in Every Detail</span>&nbsp;·&nbsp;<span>Since 1987</span>
    </div>
  </div>`;

  btnPNG.disabled = false; btnClip.disabled = false; btnPrint.disabled = false;

  if(!isReload){
    saveHist({ occ, name, from, tone, customMsg: cMsg, years: yrs, tag: tmpl.tag });
  }
}

btnGen.onclick = () => generateCard(false);

/* ── html2canvas loader – tries 3 CDNs ── */
async function ensureH2C(){
  if(window.html2canvas) return true;
  const cdns = [
    'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js',
    'https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js',
    'https://unpkg.com/html2canvas@1.4.1/dist/html2canvas.min.js'
  ];
  for(const src of cdns){
    if(window.html2canvas) return true;
    const ok = await new Promise(res=>{
      const s = document.createElement('script');
      s.src = src;
      s.onload  = ()=>res(true);
      s.onerror = ()=>res(false);
      document.head.appendChild(s);
    });
    if(ok && window.html2canvas) return true;
  }
  return false;
}

/* ── Core render to canvas ── */
async function renderToCanvas(){
  const card = document.getElementById('card');
  if(!card) throw new Error('No card to render');

  loader.classList.add('on'); setProgress(10, 'LOADING EXPORTER…');
  const ok = await ensureH2C();
  if(!ok){
    loader.classList.remove('on');
    throw new Error('Could not load html2canvas — check your network connection');
  }

  setProgress(35, 'PREPARING CARD…');
  const W=720, H=500;
  const isMultiBday = card.dataset.multiBday === 'true';
  const bgColor = isMultiBday ? '#0a1628' : '#fdfbf6';

  /* off-screen wrapper */
  const wrap = document.createElement('div');
  Object.assign(wrap.style,{
    position:'fixed', top:'0', left:'0',
    width:W+'px', height:H+'px',
    overflow:'hidden', zIndex:'99999',
    pointerEvents:'none',
    background: bgColor,
  });

  const clone = card.cloneNode(true);
  Object.assign(clone.style,{
    position:'relative',
    width:W+'px', height:H+'px',
    minWidth:W+'px', maxWidth:W+'px',
    minHeight:H+'px', maxHeight:H+'px',
    display:'flex',
    flexDirection: isMultiBday ? 'column' : 'row',
    flex:'none', borderRadius:'0',
    boxShadow:'none', animation:'none', transition:'none',
    overflow:'hidden', border:'none', outline:'none',
  });

  /* fix inner panels for standard cards */
  const cv2 = clone.querySelector('.cv');
  if(cv2) Object.assign(cv2.style,{ width:'302px', minWidth:'302px', height:'100%', overflow:'hidden', flexShrink:'0' });
  const cc2 = clone.querySelector('.cc');
  if(cc2) Object.assign(cc2.style,{ flex:'1', display:'flex', flexDirection:'column', padding:'28px 38px 52px' });

  /* kill transitions on all children */
  clone.querySelectorAll('*').forEach(el=>{
    try { el.style.animation='none'; el.style.transition='none'; } catch(_){}
  });

  wrap.appendChild(clone);
  document.body.appendChild(wrap);

  /* settle layout before capturing */
  await new Promise(r=>setTimeout(r,420));
  setProgress(60, 'RENDERING…');

  let canvas;
  try {
    canvas = await html2canvas(clone,{
      scale:2, useCORS:true, allowTaint:true,
      backgroundColor: bgColor,
      logging:false,
      width:W, height:H,
      windowWidth:W, windowHeight:H,
    });
  } finally {
    /* always remove wrapper, even if html2canvas throws */
    try{ document.body.removeChild(wrap); }catch(_){}
    loader.classList.remove('on');
  }

  setProgress(90, 'FINALISING…');
  return canvas;
}

/* ── Export PNG ── */
btnPNG.onclick = async () => {
  if(!document.getElementById('card')){ toast_('Generate a card first.', true); return; }
  const occ  = fOcc.value;
  const name = (fName.value.trim()||'Card').replace(/[^a-zA-Z0-9 _-]/g,'').trim().replace(/ +/g,'-');
  const occLabel = fOcc.options[fOcc.selectedIndex]?.text || occ;
  const ts   = new Date().toISOString().slice(0,10);
  const fileName = `HR-${name}-${occLabel.replace(/[^a-zA-Z0-9]/g,'-').replace(/-+/g,'-')}-${ts}.png`;
  try {
    const canvas = await renderToCanvas();
    setProgress(95, 'SAVING…');
    canvas.toBlob(blob=>{
      if(!blob){ toast_('PNG export failed — could not create image. Try Print PDF.', true); return; }
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.download = fileName; a.href = url;
      document.body.appendChild(a); a.click();
      setTimeout(()=>{ URL.revokeObjectURL(url); a.remove(); }, 1000);
      toast_('PNG exported: ' + fileName);
      setProgress(100,'DONE!');
    }, 'image/png', 1.0);
  } catch(e){
    console.error('PNG export error:', e);
    loader.classList.remove('on');
    const msg = e.message && e.message.includes('network') ? 'Network error — could not load image exporter. Check connection.' : 'Export failed. Try Print PDF instead.';
    toast_(msg, true);
  }
};

/* ── Copy to Clipboard ── */
btnClip.onclick = async () => {
  if(!document.getElementById('card')){ toast_('Generate a card first.', true); return; }
  if(!navigator.clipboard?.write){ toast_('Copy not supported in this browser. Use Export PNG instead.', true); return; }
  try {
    const canvas = await renderToCanvas();
    canvas.toBlob(async blob => {
      if(!blob){ toast_('Could not create image for clipboard. Use Export PNG.', true); return; }
      try {
        await navigator.clipboard.write([new ClipboardItem({'image/png': blob})]);
        toast_('Card copied to clipboard!');
      } catch(e){
        console.error('Clipboard write error:', e);
        toast_('Clipboard write blocked by browser. Use Export PNG instead.', true);
      }
    }, 'image/png', 1.0);
  } catch(e){
    console.error('Copy error:', e);
    loader.classList.remove('on');
    const msg = e.message && e.message.includes('network') ? 'Network error — could not load image exporter.' : 'Copy failed. Use Export PNG instead.';
    toast_(msg, true);
  }
};

/* ── Print ── */
btnPrint.onclick = () => {
  if(!document.getElementById('card')){ toast_('Generate a card first.', true); return; }
  window.print();
};

/* ── WhatsApp ── */
btnWA.onclick = () => {
  const isMultiBday = fOcc.value === 'birthday' && fBdayMult && fBdayMult.value !== '1';
  const tone    = fTone.value;
  const occText = fOcc.options[fOcc.selectedIndex]?.text || 'Special Occasion';
  const tmpl    = T[fOcc.value] || T.birthday;
  let recipient = (fName.value || 'Team Member').trim();
  let msgBody   = fMsg.value.trim() || tmpl['msg'+tone] || tmpl.msgFormal;
  if (isMultiBday) {
    const count = parseInt(fBdayMult.value) || 2;
    const persons = getBdayPersons(count);
    const names = persons.map(p=>p.name).filter(n=>n && !n.startsWith('Team Member'));
    if (names.length) recipient = names.join(', ');
    if (!fMsg.value.trim()) msgBody = `Warmest birthday wishes to all our incredible team members celebrating their special day today. Your dedication and spirit make our workplace truly exceptional — keep shining!`;
  }
  const txt = `🎉 *${occText} – HR Connect*\n\nDear *${recipient}*,\n\n${msgBody}\n\n— ${fFrom.value||'People & Culture Team'}\nAIS Windows | HR Connect`;
  window.open('https://wa.me/?text=' + encodeURIComponent(txt), '_blank');
};

/* ── Init ── */
fOcc.onchange();
fName.oninput();

})();
